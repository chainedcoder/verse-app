name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Set up Database
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db"
      run: |
        npx prisma db push
        npx prisma generate
        npx prisma db seed
        
    - name: Lint
      run: npm run lint
      
    - name: Run Unit Tests
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db"
      run: npx jest
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run E2E Tests
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db"
      run: npx playwright test
